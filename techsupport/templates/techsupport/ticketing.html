<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Control System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{

    --yellow:#e8d66b;
    --yellow-bright:#ffe66d;
    --yellow-dark:#b8a84c;

    --black:#0c0c0c;
    --black-soft:#151515;

    --panel:#f8f4dd;

    --text:#222;

}



/* RESET */

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{

    font-family:'Inter',sans-serif;

    height:100vh;

    overflow:hidden;


    background:

    radial-gradient(
        circle at 50% -20%,
        #fff4a8,
        transparent 45%
    ),

    linear-gradient(
        135deg,
        #d8c56a,
        #c6b454
    );

}



/* TEXTURA LEVE DE PAREDE */

body::before{

    content:"";

    position:fixed;

    inset:0;


    background:

    linear-gradient(
        rgba(120,100,20,.04) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(120,100,20,.04) 1px,
        transparent 1px
    );


    background-size:35px 35px;


    opacity:.6;

    pointer-events:none;

}



/* LUZ FLUORESCENTE */

body::after{

    content:"";

    position:fixed;

    top:0;

    left:15%;

    width:70%;

    height:180px;


    background:

    radial-gradient(
        ellipse,
        rgba(255,255,210,.35),
        transparent 70%
    );


    animation:

    lightPulse 5s infinite;


    pointer-events:none;

}



@keyframes lightPulse{

0%,100%{

opacity:.8;

}

50%{

opacity:.45;

}

}





/* WRAPPER */

.wrapper{

    display:flex;

    height:100vh;

}



/* =====================
SIDEBAR
===================== */


.sidebar{


    width:280px;


    background:

    linear-gradient(
        180deg,
        #111,
        #050505
    );


    color:white;


    padding:30px;


    box-shadow:


    15px 0 40px rgba(0,0,0,.35);



    border-right:

    1px solid rgba(255,230,109,.2);


}



/* LOGO */


.logo{

    margin-bottom:40px;

}



.logo h2{


    color:var(--yellow-bright);


    font-size:28px;


    font-weight:800;


    letter-spacing:1px;


    text-shadow:


    0 0 12px rgba(255,230,109,.4);


}



.logo p{


    color:#888;


    font-size:13px;


}




/* MENU */


.menu{


    display:flex;


    flex-direction:column;


    gap:10px;


}



.menu a{


    color:#ddd;


    text-decoration:none;


    padding:14px;


    border-radius:12px;


    display:flex;


    align-items:center;


    gap:12px;


    position:relative;


    transition:.3s;


}




.menu a::before{


    content:"";


    position:absolute;


    left:0;


    height:60%;


    width:3px;


    background:var(--yellow-bright);


    border-radius:10px;


    transform:scaleY(0);


    transition:.3s;


}




.menu a:hover::before{


    transform:scaleY(1);


}




.menu a:hover{


    background:

    rgba(255,230,109,.12);


    color:var(--yellow-bright);


    transform:translateX(5px);


}





.menu i{


    font-size:19px;


    color:var(--yellow-bright);


}



/* =====================
MAIN
===================== */


.main{


    flex:1;


    padding:35px;


    overflow:auto;


}




.title{


    font-size:36px;


    font-weight:800;


    color:#151515;


    letter-spacing:.5px;


}



.subtitle{


    color:#5b5126;


    margin-top:5px;


}



/* =====================
CARDS
===================== */


.stats{


    display:grid;


    grid-template-columns:

    repeat(4,1fr);


    gap:20px;


    margin-top:30px;


    margin-bottom:25px;


}



.card{


    background:


    rgba(255,255,240,.82);



    backdrop-filter:blur(12px);


    border-radius:20px;


    padding:25px;


    position:relative;


    overflow:hidden;


    border:


    1px solid rgba(180,160,60,.35);



    box-shadow:


    0 15px 35px rgba(0,0,0,.15);


    transition:.35s;


}




.card:hover{


    transform:

    translateY(-8px);


    box-shadow:


    0 25px 50px rgba(0,0,0,.25);


}




.card::after{


    content:"";


    position:absolute;


    right:-40px;


    top:-40px;


    width:120px;


    height:120px;


    background:


    radial-gradient(
        circle,
        rgba(255,230,109,.45),
        transparent
    );


}



.card h3{


    font-size:40px;


    color:#aaa;


    position:relative;


    z-index:1;


}



.card p{


    color:#555;


    position:relative;


    z-index:1;


}



/* =====================
PANELS
===================== */


.panel{


    background:


    rgba(255,255,240,.85);



    backdrop-filter:blur(15px);


    border-radius:22px;


    padding:22px;


    margin-bottom:25px;


    border:


    1px solid rgba(180,160,60,.35);



    box-shadow:


    0 15px 40px rgba(0,0,0,.15);


}



/* FILTROS */


.filters{


    display:grid;


    grid-template-columns:

    2fr 1fr 1fr 1fr;


    gap:15px;


}



.filters input,
.filters select{


    height:48px;


    padding:0 15px;


    border-radius:12px;


    border:1px solid #d4c36b;


    background:#fffbea;


    color:#333;


    transition:.3s;


}




.filters input:focus,
.filters select:focus{


    outline:none;


    border-color:#ffe66d;


    box-shadow:


    0 0 0 4px rgba(255,230,109,.25);


}





/* =====================
TABLE
===================== */


.table{


    width:100%;


    border-collapse:collapse;


}



.table th{


    background:#111;


    color:#ffe66d;


    padding:16px;


    text-align:left;


    letter-spacing:1px;


}



.table td{


    padding:18px;


    background:rgba(255,255,255,.5);


    border-bottom:

    1px solid rgba(0,0,0,.08);


}



.table tbody tr{


    transition:.25s;


}



.table tbody tr:hover{


    background:#fff4b0;


}




.empty-state td{


    text-align:center;


    padding:80px;


    color:#777;


}



/* SCROLL */

::-webkit-scrollbar{

width:8px;

}


::-webkit-scrollbar-thumb{


background:#111;


border-radius:20px;


}




/* RESPONSIVO */


@media(max-width:1200px){


.stats{


grid-template-columns:

repeat(2,1fr);


}


}



@media(max-width:800px){


.sidebar{

display:none;

}


.stats{

grid-template-columns:1fr;

}



.filters{

grid-template-columns:1fr;

}


}
</style>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backrooms Control System</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


<style>

:root{

    --yellow:#ffe66d;
    --dark:#080808;
    --panel:#f7f0c8;

}


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{

    font-family:'Segoe UI',sans-serif;

    height:100vh;

    overflow:hidden;


    background:


    radial-gradient(
        circle at top,
        #fff2a3,
        transparent 40%
    ),


    linear-gradient(
        135deg,
        #d7c56c,
        #bca84c
    );

}



/* textura parede */

body::before{

    content:"";

    position:fixed;

    inset:0;


    background:

    linear-gradient(
    rgba(0,0,0,.04) 1px,
    transparent 1px
    ),

    linear-gradient(
    90deg,
    rgba(0,0,0,.04) 1px,
    transparent 1px
    );


    background-size:40px 40px;


    pointer-events:none;

}



/* BOTÃO */

.menu-toggle{


    position:fixed;


    top:20px;

    left:20px;


    z-index:1000;


    width:45px;

    height:45px;


    border:none;


    border-radius:12px;


    background:#111;


    color:var(--yellow);


    font-size:22px;


    cursor:pointer;


    box-shadow:

    0 0 25px rgba(255,230,109,.35);


}





/* SIDEBAR */


.sidebar{


    position:fixed;


    left:0;

    top:0;


    height:100vh;


    width:280px;


    padding:30px;


    background:


    linear-gradient(
    180deg,
    #111,
    #050505
    );


    color:white;


    transition:.45s ease;


    border-right:

    1px solid rgba(255,230,109,.2);


    box-shadow:


    15px 0 50px rgba(0,0,0,.5);


}





/* FECHADA */


.sidebar.closed{


    width:85px;


    padding:30px 15px;


}





/* LOGO */


.logo{


    margin-bottom:45px;


}



.logo h2{


    color:var(--yellow);


    font-size:28px;


    line-height:1;


    letter-spacing:2px;


    text-shadow:

    0 0 15px rgba(255,230,109,.6);


}



.logo p{


    color:#777;


    margin-top:10px;


    font-size:12px;


}





/* MENU */


.menu{


    display:flex;


    flex-direction:column;


    gap:12px;


}



.menu a{


    height:52px;


    padding:0 15px;


    display:flex;


    align-items:center;


    gap:15px;


    color:#ddd;


    text-decoration:none;


    border-radius:12px;


    transition:.3s;


}




.menu a:hover{


    background:

    rgba(255,230,109,.12);


    color:var(--yellow);


    transform:translateX(5px);


}





.menu i{


    color:var(--yellow);


    font-size:20px;


    min-width:20px;


}





/* esconder texto fechado */


.sidebar.closed .logo h2,
.sidebar.closed .logo p,
.sidebar.closed .menu span,
.sidebar.closed .status-text{


    opacity:0;


    pointer-events:none;


}




.sidebar.closed .menu a{


    justify-content:center;


    padding:0;


}





/* STATUS BACKROOMS */


.status{


    position:absolute;


    bottom:35px;


    left:30px;


    right:30px;


    padding:15px;


    text-align:center;


    border-radius:15px;


    border:

    1px solid rgba(255,230,109,.3);


    background:

    rgba(255,230,109,.05);


    color:var(--yellow);


}



.signal{


    width:12px;


    height:12px;


    margin:auto;


    margin-bottom:10px;


    border-radius:50%;


    background:#4cff4c;


    box-shadow:

    0 0 20px #4cff4c;


    animation:

    pulse 2s infinite;


}



@keyframes pulse{


50%{

opacity:.3;

transform:scale(.7);

}


}




.status strong{


    display:block;


    letter-spacing:2px;


}



.status small{


    color:#999;


    font-size:10px;


}






/* MAIN */


.main{


    margin-left:280px;


    padding:40px;


    transition:.45s;


}



.sidebar.closed ~ .main{


    margin-left:85px;


}



.title{


    font-size:38px;


    font-weight:900;


    color:#111;


}



.subtitle{


    color:#554c25;


}




/* CARDS */


.cards{


    display:grid;


    grid-template-columns:

    repeat(4,1fr);


    gap:20px;


    margin-top:35px;


}



.card{


    background:


    rgba(255,255,240,.8);


    padding:25px;


    border-radius:20px;


    box-shadow:

    0 20px 40px rgba(0,0,0,.15);


    transition:.3s;


}



.card:hover{


    transform:

    translateY(-8px);


}



.card h2{


    color:#aaa;


    font-size:40px;


}



.card p{


    color:#555;


}






.panel{


    margin-top:30px;


    background:

    rgba(255,255,240,.8);


    padding:25px;


    border-radius:20px;


    box-shadow:

    0 20px 40px rgba(0,0,0,.15);


}



table{


    width:100%;


    border-collapse:collapse;


}



th{


    background:#111;


    color:var(--yellow);


    padding:15px;


}



td{


    padding:15px;


    background:white;


}





@media(max-width:900px){


.cards{


grid-template-columns:1fr 1fr;


}


}



</style>

</head>


<body>

<i class="bi bi-list"></i>

</button>




<aside class="sidebar" id="sidebar">


<div class="logo">

TECH<br>
SUPPORT
</h2>

Ticket Management System
</p>

</div>




<nav class="menu">

</a>

</a>

<span>Entities</span>

<div class="status">

</aside>





<main class="main">

</h1>

<section class="cards">

</div>

</div>


</section>

</tr>

</div>



</main>

function toggleMenu(){


document
.getElementById("sidebar")
.classList
.toggle("closed");


}

</body>

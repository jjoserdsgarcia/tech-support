{% load static %}
<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>M.E.G • Liminal Access System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* =========================================================
   FUNDO BACKROOMS
========================================================= */

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;

            background: radial-gradient(circle at center,
                    #1a1a1a 0%,
                    #0b0b0b 50%,
                    #000 100%);
        }

        /* vinheta forte */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle,
                    transparent 0%,
                    rgba(0, 0, 0, 0.6) 55%,
                    rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
        }

        /* =========================================================
   LÂMPADA REALISTA
========================================================= */

        .ceiling {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 140px;
            background: #111;
            z-index: 10;
        }

        /* corpo da lâmpada */
        .bulb {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;

            background: radial-gradient(circle,
                    #fff6c2 0%,
                    #ffe88a 30%,
                    #c9a94a 70%,
                    #6b5a1d 100%);

            box-shadow:
                0 0 40px rgba(255, 230, 140, 0.9),
                0 0 120px rgba(255, 220, 120, 0.5),
                0 0 200px rgba(255, 210, 100, 0.25);

            z-index: 11;
        }

        /* luz ambiente da lâmpada */
        .ambient {
            position: fixed;
            inset: 0;

            background: radial-gradient(circle at 50% 25%,
                    rgba(255, 240, 170, 0.35) 0%,
                    rgba(255, 220, 140, 0.18) 25%,
                    rgba(0, 0, 0, 0.85) 60%,
                    rgba(0, 0, 0, 1) 100%);

            pointer-events: none;
        }

        /* =========================================================
   LANTERNA (MOUSE)
========================================================= */

        .flashlight {
            position: fixed;
            inset: 0;

            background: radial-gradient(circle at var(--x) var(--y),
                    rgba(255, 255, 230, 0.25) 0%,
                    rgba(0, 0, 0, 0.85) 45%,
                    rgba(0, 0, 0, 1) 70%);

            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* =========================================================
   LOGIN
========================================================= */

        .wrap {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        .login-card {
            width: 420px;
            padding: 28px;

            background: rgba(255, 255, 240, 0.92);
            border-radius: 14px;

            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.6);

            backdrop-filter: blur(6px);
        }

        /* =========================================================
   INTRO
========================================================= */

        #intro {
            position: fixed;
            inset: 0;
            background: #000;
            color: #d6c77a;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            font-family: monospace;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <!-- LÂMPADA -->
    <div class="ceiling"></div>
    <div class="bulb" id="bulb"></div>

    <!-- AMBIENTE -->
    <div class="ambient" id="ambient"></div>

    <!-- LANTERNA -->
    <div class="flashlight"></div>

    <!-- INTRO -->
    <div id="intro">
        <div>M.E.G DATABASE NODE</div>
        <div id="bootText" style="margin-top:10px;font-size:12px;">initializing...</div>
    </div>

    <!-- LOGIN -->
    <div class="wrap">
        <div class="login-card">

            <div style="display:flex;gap:10px;align-items:center;margin-bottom:15px;">
                <div style="
                width:42px;height:42px;border-radius:8px;
                background:linear-gradient(135deg,#f3df7a,#8c6a12);
                display:flex;align-items:center;justify-content:center;
                color:#fff;font-weight:bold;">TS</div>

                <div>
                    <div style="font-weight:700;">Tech Support</div>
                    <div style="font-size:12px;opacity:0.6;">System Access Panel</div>
                </div>
            </div>

            <form method="post" action="{% url 'loginscreen' %}">
                {% csrf_token %}
                <input class="form-control mb-2" name="username" placeholder="Nome">
                <input class="form-control mb-3" type="password" name="password" placeholder="Senha">
                <button class="btn btn-dark w-100">Entrar</button>
                <div class="text-center mt-3">
                    <small>Não tem uma conta? <a href="{% url 'registerscreen' %}">Criar conta</a></small>
                </div>
                {% if error %}
                <div class="alert alert-danger" role="alert" style="margin-top: 15px;">
                    {{ error }}
                </div>
                {% endif %}
            </form>

        </div>
    </div>

    <script>

        /* =========================================================
           INTRO
        ========================================================= */

        const intro = document.getElementById("intro");
        const bootText = document.getElementById("bootText");

        const lines = [
            "initializing system...",
            "loading environment...",
            "stabilizing light source...",
            "ready."
        ];

        let i = 0;

        setInterval(() => {
            bootText.textContent = lines[i++];
            if (i >= lines.length) {
                setTimeout(() => intro.style.opacity = "0", 800);
                setTimeout(() => intro.remove(), 1500);
            }
        }, 700);

        /* =========================================================
           LANTERNA
        ========================================================= */

        document.addEventListener("mousemove", (e) => {
            document.documentElement.style.setProperty("--x", e.clientX + "px");
            document.documentElement.style.setProperty("--y", e.clientY + "px");
        });

        /* =========================================================
           FLICKER DA LÂMPADA (REALISTA)
        ========================================================= */

        const bulb = document.getElementById("bulb");
        const ambient = document.getElementById("ambient");

        setInterval(() => {

            if (Math.random() > 0.92) {

                bulb.style.opacity = "0.6";
                ambient.style.opacity = "0.6";

                setTimeout(() => {
                    bulb.style.opacity = "1";
                    ambient.style.opacity = "1";
                }, 90);
            }

        }, 400);

    </script>

</body>

</html>

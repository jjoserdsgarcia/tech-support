{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M.E.G ACCESS TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}


body{

height:100vh;

overflow:hidden;

background:#05070a;

}


/* ========================= */
/* VIDEO FUNDO */
/* ========================= */


.background-video{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

object-fit:cover;

filter:brightness(.25) contrast(1.3);

transform:scale(1.05);

z-index:-3;

}



/* camada escura */

.overlay{

position:fixed;

inset:0;

background:rgba(0,0,0,.35);

z-index:-2;

}



/* ========================= */
/* ICONE CENTRAL */
/* ========================= */


.access-icon{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:140px;
height:140px;

border-radius:50%;

border:2px solid #00ff9d;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

background:rgba(0,255,157,.05);

box-shadow:
0 0 20px #00ff9d,
inset 0 0 20px rgba(0,255,157,.4);

animation:pulse 2s infinite;

transition:.5s;

overflow:hidden;

}


/* LOGO DENTRO DO ICONE */

.access-icon img{

width:250px;

height: 250px;

object-fit:contain;

filter:
drop-shadow(0 0 10px #00ff9d);

transition:.5s;

}s



/* EFEITO AO PASSAR O MOUSE */

.access-icon:hover{

transform:
translate(-50%,-50%)
scale(1.15);

}


.access-icon:hover img{

filter:
drop-shadow(0 0 25px #00ff9d);

transform:scale(1.1);

}



/* PULSAÇÃO */

@keyframes pulse{


0%{

box-shadow:
0 0 15px #def512;

}


50%{

box-shadow:
0 0 60px #def512;

}


100%{

box-shadow:
0 0 15px #def512;

}


}



/* ========================= */
/* TOP BAR */
/* ========================= */


.topbar{


position:absolute;


top:0;


width:100%;


padding:18px 25px;


display:flex;


justify-content:space-between;


color:#aaa;


font-size:11px;


letter-spacing:2px;


background:rgba(0,0,0,.3);


}


.status-online{

color:#00ff88;

}

/* ========================= */
/* LOGIN BOX */
/* ========================= */


.login-box{


position:absolute;


top:50%;


left:50%;


transform:

translate(-50%,-45%)

scale(.8);



width:420px;



padding:40px;



opacity:0;



pointer-events:none;



background:

linear-gradient(

135deg,

rgba(0,255,157,.10),

rgba(0,0,0,.85)

);



border:

1px solid rgba(0,255,157,.4);



box-shadow:


0 0 40px rgba(0,255,157,.25),


inset 0 0 50px rgba(0,255,157,.05);



backdrop-filter:blur(15px);



transition:1s;



}



/* aparece depois do clique */


.login-box.active{


opacity:1;


pointer-events:auto;



transform:

translate(-50%,-50%)

scale(1);



}



/* linha de scanner */


.login-box::before{


content:"";


position:absolute;


top:0;


left:0;


height:2px;


width:100%;


background:#00ff9d;


animation:scan 2s infinite;


}



@keyframes scan{


0%{

transform:translateX(-100%);

}


100%{

transform:translateX(100%);

}


}



/* ========================= */
/* TITULO */
/* ========================= */


.login-box h1{


text-align:center;


font-size:25px;


letter-spacing:6px;


color:white;


margin-bottom:8px;


}



.login-box p{


text-align:center;


font-size:10px;


letter-spacing:3px;


color:#777;


margin-bottom:25px;


}



/* ========================= */
/* INPUTS */
/* ========================= */


.input-group{


margin-bottom:15px;


}



.input-group input{


width:100%;


padding:14px;


background:rgba(255,255,255,.05);



border:

1px solid rgba(255,255,255,.1);



color:white;


outline:none;


font-size:12px;


letter-spacing:2px;


transition:.3s;


}



.input-group input:focus{


border-color:#def512;


box-shadow:

0 0 15px rgba(0,255,157,.4);


}



/* ========================= */
/* BOTAO */
/* ========================= */


button{


width:100%;


padding:14px;



border:none;


cursor:pointer;



background:

linear-gradient(

90deg,

#00ff9d,

#00b8ff

);



color:#000;



font-weight:bold;


letter-spacing:3px;


transition:.3s;


}



button:hover{


transform:scale(1.04);


filter:brightness(1.2);


}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

margin-top:20px;

text-align:center;

font-size:9px;

letter-spacing:2px;

color:#666;

}

/* ========================= */
/* GLITCH */
/* ========================= */

.glitch{

position:relative;

display:inline-block;

}

.glitch::before,

.glitch::after{

content:"M.E.G";

position:absolute;

left:0;

width:100%;

z-index:-1;

}

.glitch::before{

color:#def512;

top:-2px;

animation:glitch 2s infinite;

}

.glitch::after{

color:#def512;

top:2px;

animation:glitch 1.5s infinite;

}

@keyframes glitch{

0%{

transform:translate(0);

opacity:.3;

}

20%{

transform:translate(-2px,1px);

}

40%{

transform:translate(2px,-1px);

}

60%{

transform:translate(-1px,0);

}

80%{

transform:translate(2px,2px);

}

100%{

transform:translate(0);

opacity:.2;

}

}

</style>

</head>

<body>

<!-- VÍDEO DE FUNDO -->

<video class="background-video" autoplay muted loop playsinline>

    <source src="{% static 'video/video.mp4' %}" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="scanlines"></div>

<!-- ÍCONE INICIAL -->

<div class="access-icon" onclick="openLogin()">
    <img src="{% static 'images/meg_logos.png' %}" alt="M.E.G LOGO">
</div>

<!-- BARRA SUPERIOR -->

<div class="topbar">

    <div>M.E.G SYSTEMS v2.7.1</div>

    <div>NODE : BACKROOMS-02</div>

    <div class="status-online">
        STATUS : ONLINE
    </div>

</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<h1 class="glitch">
M.E.G
</h1>

<p>
INTERNAL ACCESS PORTAL
</p>

<div class="input-group">

<input 
type="text" 
placeholder="USER ID">

</div>

<div class="input-group">

<input 
type="password" 
placeholder="PASSWORD">

</div>

<button onclick="auth()">

AUTHENTICATE

</button>

<div class="footer">

ULTIMATE SECURITY PROTOCOL • VERIFICATION REQUIRED

</div>

</div>

<script>

// ABRIR LOGIN PELO ICONE

function openLogin(){

const icon = document.querySelector(".access-icon");

const box = document.getElementById("loginBox");

icon.style.opacity="0";

icon.style.transform=
"translate(-50%,-50%) scale(0)";

setTimeout(()=>{

icon.style.display="none";

box.classList.add("active");

},500);

}

// BOTÃO AUTHENTICATE

function auth(){

const btn=document.querySelector("button");

btn.innerHTML="VERIFYING...";

btn.disabled=true;

setTimeout(()=>{

btn.innerHTML="ACCESS DENIED";

btn.style.background=
"linear-gradient(90deg,#ff0033,#ff8800)";

},2000);

}
</script>
</body>
</html>

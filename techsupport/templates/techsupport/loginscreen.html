<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechSupport - Login</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}


body{

    height:100vh;
    overflow:hidden;
    background:black;

}


/* =========================
   VIDEO FUNDO LOGIN
========================= */


.video-bg{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-2;

}



/* ESCURECER VIDEO */

.overlay{

    position:fixed;

    inset:0;

    background:

    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.85)
    );

    z-index:-1;

}




/* =========================
   INTRO
========================= */


.intro-screen{

    position:fixed;

    inset:0;

    background:black;

    z-index:9999;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    opacity:1;

    transition:opacity 2s ease, visibility 2s;

}



.intro-screen video{

    width:100%;

    height:100%;

    object-fit:cover;

}



.intro-screen::after{

    content:"";

    position:absolute;

    inset:0;

    background:rgba(0,0,0,.5);

}




.intro-text{

    position:absolute;

    z-index:2;

    text-align:center;

    color:white;

}




.intro-text h1{

    font-size:65px;

    letter-spacing:12px;

    color:#e6c86e;


    text-shadow:

    0 0 20px #d4af37,

    0 0 40px #d4af37;

}



.intro-text p{

    margin-top:20px;

    font-size:22px;

    color:#ddd;

}




.fade-out{

    opacity:0;

    visibility:hidden;

    pointer-events:none;

}





/* =========================
   LOGIN
========================= */



.container{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}





.login-box{


    width:420px;


    padding:45px;


    background:

    rgba(255,255,255,.08);



    backdrop-filter:blur(15px);



    border-radius:18px;



    border:

    1px solid rgba(255,255,255,.15);



    box-shadow:

    0 0 40px black,

    inset 0 0 30px rgba(255,200,100,.08);



    color:white;


}





.login-box h1{


    text-align:center;


    margin-bottom:35px;


    font-size:38px;


    letter-spacing:5px;


    color:#e6c86e;



    text-shadow:

    0 0 10px #d4af37,

    0 0 20px #d4af37;


}




.input-box{

    position:relative;

    margin-bottom:20px;

}





input{


    width:100%;


    padding:15px;


    padding-right:50px;


    border:none;


    outline:none;


    border-radius:10px;



    background:

    rgba(255,255,255,.12);



    color:white;


    font-size:16px;


}




input::placeholder{

    color:#ddd;

}





/* OLHO */

.olho{


    position:absolute;


    right:15px;


    top:50%;


    transform:translateY(-50%);



    cursor:pointer;


    font-size:20px;


    color:#e6c86e;


}




.olho:hover{

    color:white;

}




button{


    width:100%;


    padding:15px;



    border:none;


    border-radius:10px;



    background:

    linear-gradient(

    90deg,

    #c89b3c,

    #f5db8a

    );



    color:#222;


    font-size:17px;


    font-weight:bold;


    cursor:pointer;



    transition:.3s;


}





button:hover{


    transform:scale(1.04);


    box-shadow:

    0 0 25px #d4af37;


}





.erro{


    margin-top:20px;


    text-align:center;


    color:#ff6b6b;


    font-weight:bold;


}





.cadastro{


    margin-top:25px;


    text-align:center;


}




.cadastro a{


    color:#e6c86e;


    text-decoration:none;


}



.cadastro a:hover{

    text-decoration:underline;

}


</style>


</head>



<body>



<!-- VIDEO DO LOGIN -->

<video class="video-bg" autoplay muted loop>

    <source src="/static/video/video.mp4" type="video/mp4">

</video>




<div class="overlay"></div>





<!-- INTRO -->

<div class="intro-screen" id="intro">


    <video id="introVideo" autoplay muted>

        <source src="/static/video/Fall.mp4" type="video/mp4">

    </video>



    <div class="intro-text">


        <h1>TECHSUPPORT</h1>


        <p>Inicializando sistema...</p>


    </div>


</div>







<!-- LOGIN -->


<div class="container">


<div class="login-box">



<h1>TECHSUPPORT</h1>



<form method="POST">


{% csrf_token %}



<div class="input-box">


<input

type="text"

name="username"

placeholder="Usuário"

required>


</div>





<div class="input-box">


<input

type="password"

id="password"

name="password"

placeholder="Senha"

required>


<span class="olho" onclick="mostrarSenha()">

👁

</span>


</div>

<button type="submit">

ENTRAR

</button>

</form>

{% if error %}

<div class="erro">

{{ error }}

</div>

{% endif %}

<div class="cadastro">


<a href="{% url 'registerscreen' %}">

Criar conta

</a>


</div>



</div>

</div>

<script>


// MOSTRAR SENHA

function mostrarSenha(){


    let senha = document.getElementById("password");


    if(senha.type === "password"){


        senha.type="text";


    }

    else{


        senha.type="password";


    }


}

// TRANSIÇÃO INTRO


window.onload=function(){


    let intro=document.getElementById("intro");

    let video=document.getElementById("introVideo");



    video.addEventListener("ended",function(){


        intro.classList.add("fade-out");


    });



    // segurança caso o vídeo seja longo

    setTimeout(function(){


        intro.classList.add("fade-out");


    },10000);



};

</script>

</body>

</html>
